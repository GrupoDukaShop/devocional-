<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>365 dias com Maria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }

    @keyframes stepIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-enter { animation: stepIn 0.45s ease forwards; }

    @keyframes pulseBtn {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(34,197,94,.45); }
      50%       { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(34,197,94,0);  }
    }
    .btn-pulse-green { animation: pulseBtn 2s infinite; }

    @keyframes pulseBtnBlue {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(14,165,233,.45); }
      50%       { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(14,165,233,0);  }
    }
    .btn-pulse-blue { animation: pulseBtnBlue 2s infinite; }

    .quiz-opt {
      transition: transform .15s, border-color .15s, background .15s;
      cursor: pointer;
    }
    .quiz-opt:hover  { transform: translateX(4px); border-color: #0ea5e9; background: #f0f9ff; }
    .quiz-opt:active { transform: scale(.98); }

    .score-gradient {
      background: linear-gradient(to right, #ef4444 0%, #f97316 35%, #eab308 60%, #22c55e 100%);
    }

    /* Carousel */
    .carousel-track { display: flex; transition: transform .4s ease; }
    .carousel-slide  { flex-shrink: 0; width: 100%; }
  </style>
</head>
<body class="bg-gray-50 text-gray-950 antialiased min-h-screen flex justify-center">

  <div class="w-full max-w-lg bg-white min-h-screen flex flex-col shadow-sm">

    <!-- Header (logo + optional back) -->
    <div id="hdr" class="hidden px-4 pt-4 pb-2 border-b border-gray-100">
      <div class="flex items-center">
        <button id="backBtn" class="hidden w-7 text-gray-400 hover:text-gray-600" onclick="goBack()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="flex-1 flex justify-center">
          <span class="text-2xl select-none">🌹</span>
        </div>
        <div class="w-7"></div>
      </div>
    </div>

    <!-- Progress bar -->
    <div id="pgWrap" class="hidden px-4 pt-3 pb-1">
      <div class="w-full bg-gray-200 rounded-full h-2.5">
        <div id="pgBar" class="bg-sky-500 h-2.5 rounded-full transition-all duration-700" style="width:5%"></div>
      </div>
    </div>

    <!-- Content -->
    <div id="content" class="flex-1 px-5 py-6 overflow-y-auto"></div>

  </div>

  <script>
  /* ─── state ──────────────────────────────── */
  const S = { step: 0, nome: '', prece: '' };

  /* ─── steps definition ───────────────────── */
  const STEPS = [

    /* 0 · Landing */
    { hdr: false, pg: false, pct: 0,
      html() { return `
        <div class="step-enter flex flex-col items-center gap-6 text-center">
          <p class="text-sky-600 font-bold text-lg tracking-wide">ISSO NÃO É POR ACASO...</p>
          <p class="text-gray-700 text-base">
            Se você chegou até aqui, é porque <strong>ELA TE CHAMOU</strong> ❤️ 🙏🏻
          </p>
          <div class="w-52 h-64 rounded-2xl overflow-hidden border border-sky-100 shadow-sm">
            <img src="capa.jpg" alt="Capa" class="w-full h-full object-cover">
          </div>
          <p class="text-sky-700 font-bold text-base">
            Mas agora... VOCÊ VAI TER CORAGEM DE DIZER "SIM"?
          </p>
          <button onclick="next()" class="btn-pulse-blue w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl text-base transition-colors">
            INICIAR JORNADA
          </button>
          <p class="text-gray-500 text-sm leading-relaxed">
            📜 Responda algumas perguntas rápidas... E receba um Devocional feito para você. Com oração, direção e fé.
          </p>
        </div>`; }
    },

    /* 1 · Name form */
    { hdr: true, pg: true, pct: 10,
      html() { return `
        <div class="step-enter flex flex-col gap-6">
          <div class="text-center">
            <h1 class="text-lg font-semibold text-gray-900 leading-snug">
              Gostaria de deixar seu nome para que o incluamos em nosso Livro de Orações?
            </h1>
            <p class="mt-3 text-sm text-gray-600 leading-relaxed">
              Com grande alegria, levaremos seu nome ao altar em nossas preces diárias.
              Ao registrá-lo aqui, unimos sua intenção à nossa comunidade de fé, confiando
              tudo ao Coração Misericordioso de Jesus e à intercessão de Nossa Senhora. 🙏🌹
            </p>
          </div>
          <div class="flex flex-col gap-3">
            <label class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3 focus-within:border-sky-500 transition-colors">
              <svg class="text-gray-400 w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input id="nomeInput" type="text" placeholder="Digite seu nome aqui"
                class="flex-1 outline-none text-gray-900 placeholder-gray-400 bg-transparent"
                onkeydown="if(event.key==='Enter')submitNome()">
            </label>
            <button onclick="submitNome()"
              class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl text-base transition-colors">
              Enviar
            </button>
          </div>
        </div>`; }
    },

    /* 2 · Name confirmation */
    { hdr: true, pg: true, pct: 20,
      html() { return `
        <div class="step-enter flex flex-col gap-6 text-center">
          <h1 class="text-lg font-semibold text-gray-900 leading-snug">
            <span class="text-sky-500 font-bold">${esc(S.nome)}</span>, é uma bênção contar com sua presença! 🙏
          </h1>
          <p class="text-base text-gray-700 leading-relaxed">
            Seu nome já foi cuidadosamente incluído em nosso Livro de Orações.
            Ele será lembrado com carinho e fé em cada dia, diante do altar do Senhor.
          </p>
          <button onclick="next()" class="btn-pulse-blue w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl text-base transition-colors">
            CONTINUAR
          </button>
        </div>`; }
    },

    /* 3 · Quiz: areas */
    { hdr: true, pg: true, pct: 30,
      html() {
        const opts = [
          ['💵','Minha vida financeira e profissional'],
          ['💓','Harmonia nos relacionamentos familiares'],
          ['🛐','Proteção e força espiritual'],
          ['🙏','Minha caminhada de fé'],
          ['💭','Outra intenção'],
        ];
        return `
        <div class="step-enter flex flex-col gap-5">
          <h1 class="text-lg font-semibold text-gray-900 text-center leading-snug">
            Em quais áreas você deseja colocar seu coração neste Devocional?
          </h1>
          <div class="flex flex-col gap-3">
            ${ opts.map(([e,t]) => `
              <div class="quiz-opt flex items-center gap-4 border border-gray-200 rounded-xl px-4 py-3" onclick="next()">
                <span class="text-2xl">${e}</span>
                <span class="text-base text-gray-800">${t}</span>
              </div>`).join('') }
          </div>
        </div>`; }
    },

    /* 4 · Quiz: spiritual state */
    { hdr: true, pg: true, pct: 40,
      html() {
        const opts = [
          ['❤️‍🔥','Sinto que preciso de uma purificação interior'],
          ['🌿','Busco uma renovação espiritual'],
          ['🕊️','Estou em paz, mas desejo mais clareza e direção'],
          ['🛡️','Sinto necessidade de proteção e paz espiritual'],
          ['🙏','Quero fortalecer minha fé e minha comunhão com Deus'],
        ];
        return `
        <div class="step-enter flex flex-col gap-5">
          <h1 class="text-lg font-semibold text-gray-900 text-center leading-snug">
            Como está o seu coração espiritual neste momento?
          </h1>
          <div class="flex flex-col gap-3">
            ${ opts.map(([e,t]) => `
              <div class="quiz-opt flex items-center gap-4 border border-gray-200 rounded-xl px-4 py-3" onclick="next()">
                <span class="text-2xl">${e}</span>
                <span class="text-base text-gray-800">${t}</span>
              </div>`).join('') }
          </div>
        </div>`; }
    },

    /* 5 · Quiz: stuck */
    { hdr: true, pg: true, pct: 50,
      html() {
        const opts = [
          ['😟','Sim… Sinto que tudo está travado, e nada parece dar certo.'],
          ['😔','Sim… Algumas áreas da minha vida parecem estagnadas.'],
          ['🥰','Graças a Deus, sinto que tudo está fluindo bem no momento.'],
        ];
        return `
        <div class="step-enter flex flex-col gap-5">
          <h1 class="text-lg font-semibold text-gray-900 text-center leading-snug">
            Você sente que há algo em sua vida que, apesar de seus esforços, ainda não se resolve?
          </h1>
          <div class="flex flex-col gap-3">
            ${ opts.map(([e,t]) => `
              <div class="quiz-opt flex items-center gap-4 border border-gray-200 rounded-xl px-4 py-3" onclick="next()">
                <span class="text-2xl">${e}</span>
                <span class="text-base text-gray-800">${t}</span>
              </div>`).join('') }
          </div>
        </div>`; }
    },

    /* 6 · Prayer form */
    { hdr: true, pg: true, pct: 80,
      html() { return `
        <div class="step-enter flex flex-col gap-5">
          <div class="text-center">
            <h1 class="text-xl font-bold text-gray-900">Deus quer te abençoar hoje! ✨🙏</h1>
            <p class="mt-2 text-base text-gray-700 leading-relaxed">
              <span class="text-sky-500 font-bold">${esc(S.nome)}</span>,
              se você pudesse ver <strong class="text-sky-700">seu maior desejo realizado</strong>, o que pediria?
            </p>
          </div>
          <p class="text-sm text-gray-600 text-center leading-relaxed">
            Talvez seja <strong>uma cura</strong>, ou a <strong>restauração da sua família</strong>,
            a <strong>libertação de um vício</strong>, a <strong>prosperidade financeira</strong>,
            o reencontro com <strong>o amor verdadeiro</strong> ou, simplesmente,
            a <strong>paz no coração</strong>...
          </p>
          <div class="bg-sky-50 border border-sky-100 rounded-2xl p-4 text-center flex flex-col gap-2">
            <p class="text-sm text-gray-700 leading-relaxed">
              Declare com fé seu pedido abaixo. Nossa Senhora, cheia de graça e fonte de bênçãos,
              levará sua súplica até o coração de Jesus. Ela intercederá poderosamente por você! ❤️🌹
            </p>
            <p class="text-sm text-gray-600">
              Acredite: nada é impossível para Deus. Com este Devocional, Ele agirá com amor e poder em sua vida. 🙌
            </p>
          </div>
          <div class="flex flex-col gap-3">
            <label class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3 focus-within:border-sky-500 transition-colors">
              <svg class="text-gray-400 w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input id="preceInput" type="text" placeholder="Digite aqui sua prece..."
                class="flex-1 outline-none text-gray-900 placeholder-gray-400 bg-transparent"
                onkeydown="if(event.key==='Enter')submitPrece()">
            </label>
            <button onclick="submitPrece()"
              class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl text-base transition-colors">
              CONTINUAR
            </button>
          </div>
        </div>`; }
    },

    /* 8 · Quiz: teachings valuable */
    { hdr: true, pg: true, pct: 90,
      html() {
        const opts = [
          ['🙏','Sim, seria muito valioso para minha vida!'],
          ['🙌','Sim, acredito que seria útil sim.'],
          ['🤔','Talvez… depende de como isso se aplicaria.'],
        ];
        return `
        <div class="step-enter flex flex-col gap-5">
          <h1 class="text-lg font-semibold text-gray-900 text-center leading-snug">
            Se você pudesse viver os ensinamentos de Jesus de forma prática no seu dia a dia
            com a intercessão de Nossa Senhora, isso seria valioso para você?
          </h1>
          <div class="flex flex-col gap-3">
            ${ opts.map(([e,t]) => `
              <div class="quiz-opt flex items-center gap-4 border border-gray-200 rounded-xl px-4 py-3" onclick="next()">
                <span class="text-2xl">${e}</span>
                <span class="text-base text-gray-800">${t}</span>
              </div>`).join('') }
          </div>
          <p class="text-center text-sm font-semibold text-sky-600">
            Você está prestes a viver uma grande transformação espiritual! 🙏❤️
          </p>
        </div>`; }
    },

    /* 9 · Loading */
    { hdr: false, pg: true, pct: 95,
      html() { return `
        <div class="step-enter flex flex-col gap-6 text-center">
          <h1 class="text-lg font-semibold text-gray-900">Gerando seu Devocional 🙏❤️</h1>
          <div class="w-full max-h-72 rounded-2xl overflow-hidden border border-sky-100">
            <img src="capa2.jpg" alt="Devocional" class="w-full h-full object-cover">
          </div>
          <div class="flex flex-col gap-1.5">
            <div class="w-full bg-gray-200 rounded-full h-3">
              <div id="ldBar" class="bg-sky-500 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
            </div>
            <span id="ldPct" class="text-sm text-gray-500">0%</span>
          </div>
          <button id="ldBtn" onclick="next()"
            class="hidden btn-pulse-blue w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl text-base transition-colors">
            CONTINUAR
          </button>
        </div>`; },
      onEnter() {
        let p = 0;
        const iv = setInterval(() => {
          p = Math.min(100, p + Math.random() * 7 + 2);
          const bar = document.getElementById('ldBar');
          const pct = document.getElementById('ldPct');
          if (bar) bar.style.width = p + '%';
          if (pct) pct.textContent = Math.floor(p) + '%';
          if (p >= 100) {
            clearInterval(iv);
            document.getElementById('ldBtn')?.classList.remove('hidden');
          }
        }, 350);
      }
    },

    /* 10 · Parabéns – results */
    { hdr: false, pg: true, pct: 100,
      html() { return `
        <div class="step-enter flex flex-col gap-6 text-center">
          <div>
            <h1 class="text-2xl font-bold text-gray-900">Parabéns!</h1>
            <p class="mt-2 text-sm text-gray-600 leading-relaxed">
              Tenho certeza de que o Criador está orgulhoso de você sentir essa vontade de
              mudança e principalmente de crescer espiritualmente com Jesus!
            </p>
          </div>
          <h2 class="text-base font-semibold text-gray-800">
            A mudança que Jesus fará na sua vida em 2025:
          </h2>
          <button onclick="next()"
            class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl text-base transition-colors">
            CONTINUAR
          </button>
        </div>`; }
    },


  /* 12 · ETAPA 07 – sales page */
    { hdr: false, pg: false, pct: 100,
      html() {
        const buyBtn = () => `
          <div class="flex flex-col gap-2">
            <button onclick="checkout()"
              class="btn-pulse-green w-full bg-green-500 hover:bg-green-600 text-white font-bold py-5 rounded-xl text-base transition-colors">
              EU QUERO MARIA COMIGO!
            </button>
            <p class="text-center text-sm">
              <span class="text-red-500"><s>De R$97</s></span>
              <span class="text-green-700 font-bold ml-1"> por apenas R$37,00 ou 8x de R$5,38</span>
            </p>
          </div>`;

        const dots = [0,1,2,3,4,5].map(i => `
          <button onclick="carouselGo(${i})"
            class="w-2 h-2 rounded-full transition-colors ${i===0?'bg-sky-500':'bg-gray-300'}"
            id="dot${i}"></button>`).join('');

        return `
        <div class="step-enter flex flex-col gap-6 pb-6">

          <h1 class="text-lg font-bold text-center leading-snug">
            <span style="color:#0284c7">Seu Devocional com Maria está pronto!</span>
            <strong> Veja abaixo&nbsp;🙏</strong>
          </h1>

          <img src="img1.png" alt="" class="w-full rounded-xl">

          <h2 class="text-lg font-semibold text-gray-900 text-center">O que está incluso em seu pacote devocional?</h2>

          <img src="img2.png" alt="" class="w-full rounded-xl">
          <img src="img3.png" alt="" class="w-full rounded-xl">

          ${ buyBtn() }

          <img src="img4.png" alt="" class="w-full rounded-xl">
          <img src="img5.png" alt="" class="w-full rounded-xl">

          ${ buyBtn() }

          <img src="img6.png" alt="" class="w-60 mx-auto rounded-xl block">

          <div class="text-center">
            <h2 class="text-lg font-semibold text-gray-900">Nosso Devocional é confiavel?</h2>
            <p class="text-sm text-gray-600 mt-1">SIMM! 100% aqui estão algumas avaliações das pessoas que já adquiriram! 👇</p>
          </div>

          <div class="relative overflow-hidden rounded-2xl" id="carousel">
            <div class="carousel-track" id="cTrack">
              <div class="carousel-slide px-1"><img src="img7.png"  alt="" class="w-full rounded-xl"></div>
              <div class="carousel-slide px-1"><img src="img8.png"  alt="" class="w-full rounded-xl"></div>
              <div class="carousel-slide px-1"><img src="img9.png"  alt="" class="w-full rounded-xl"></div>
              <div class="carousel-slide px-1"><img src="img10.png" alt="" class="w-full rounded-xl"></div>
              <div class="carousel-slide px-1"><img src="img11.png" alt="" class="w-full rounded-xl"></div>
              <div class="carousel-slide px-1"><img src="img12.png" alt="" class="w-full rounded-xl"></div>
            </div>
            <div class="flex justify-center gap-1.5 mt-3" id="cDots">
              ${dots}
            </div>
          </div>

          ${ buyBtn() }

          <div class="text-center">
            <h2 class="text-lg font-semibold text-gray-900">Tem Garantia?</h2>
            <p class="text-sm text-gray-600 mt-1">SIM! Estamos tão confiantes que o nosso Devocional te ajudará que garantimos um reembolso total no prazo de 90 dias após a compra.</p>
          </div>

          <img src="img13.png" alt="" class="w-44 mx-auto rounded-xl block">

        </div>`;
      },
      onEnter() { setTimeout(carouselInit, 50); }
    },

  ]; /* end STEPS */

  /* ─── navigation ─────────────────────────── */
  function render() {
    const s = STEPS[S.step];

    const hdr    = document.getElementById('hdr');
    const pgWrap = document.getElementById('pgWrap');
    const pgBar  = document.getElementById('pgBar');
    const content= document.getElementById('content');

    hdr.classList.toggle('hidden', !s.hdr);
    pgWrap.classList.toggle('hidden', !s.pg);
    if (s.pg) pgBar.style.width = s.pct + '%';

    content.innerHTML = s.html();
    if (s.onEnter) s.onEnter();
    window.scrollTo(0, 0);
  }

  function next()   { if (S.step < STEPS.length-1) { S.step++; render(); } }
  function goBack() { if (S.step > 0)               { S.step--; render(); } }

  function submitNome() {
    const v = (document.getElementById('nomeInput')?.value||'').trim();
    if (!v) { document.getElementById('nomeInput')?.focus(); return; }
    S.nome = v;
    next();
  }

  function submitPrece() {
    const v = (document.getElementById('preceInput')?.value||'').trim();
    if (!v) { document.getElementById('preceInput')?.focus(); return; }
    S.prece = v;
    next();
  }

  function checkout() {
    window.location.href = 'https://checkout.payt.com.br/73b379bfcd1b74b5610d1083bce8fd79?payment=pix';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─── audio simulation ───────────────────── */
  let aPlaying = false, aTimer = null, aSec = 0;
  const A_DUR = 225;

  function audioReset() { aPlaying = false; aSec = 0; clearInterval(aTimer); }

  function toggleAudio() {
    aPlaying = !aPlaying;
    const btn = document.getElementById('aBtn');
    if (aPlaying) {
      if (btn) btn.textContent = '⏸';
      aTimer = setInterval(() => {
        aSec = Math.min(aSec+1, A_DUR);
        const bar = document.getElementById('aBar');
        const tm  = document.getElementById('aTime');
        if (bar) bar.style.width = (aSec/A_DUR*100)+'%';
        if (tm)  tm.textContent  = `${Math.floor(aSec/60)}:${String(aSec%60).padStart(2,'0')}`;
        if (aSec >= A_DUR) { clearInterval(aTimer); aPlaying=false; if(btn) btn.textContent='▶'; }
      }, 1000);
    } else {
      clearInterval(aTimer);
      if (btn) btn.textContent = '▶';
    }
  }

  function seekAudio(e, el) {
    const r = el.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    aSec = Math.floor(p * A_DUR);
    const bar = document.getElementById('aBar');
    const tm  = document.getElementById('aTime');
    if (bar) bar.style.width = (p*100)+'%';
    if (tm)  tm.textContent  = `${Math.floor(aSec/60)}:${String(aSec%60).padStart(2,'0')}`;
  }

  /* ─── carousel ───────────────────────────── */
  let cIdx = 0, cTotal = 0, cTimer = null;

  function carouselInit() {
    const track = document.getElementById('cTrack');
    if (!track) return;
    cTotal = track.children.length;
    cIdx = 0;
    clearInterval(cTimer);
    cTimer = setInterval(() => carouselGo((cIdx+1) % cTotal), 3500);
  }

  function carouselGo(i) {
    cIdx = i;
    const track = document.getElementById('cTrack');
    if (track) track.style.transform = `translateX(-${i*100}%)`;
    document.querySelectorAll('[id^="dot"]').forEach((d,j) => {
      d.className = `w-2 h-2 rounded-full transition-colors ${j===i?'bg-sky-500':'bg-gray-300'}`;
    });
  }

  /* ─── boot ───────────────────────────────── */
  render();
  </script>
</body>
</html>
